<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025年度 コーチング大会 選出発表 | 株式会社キューマックス</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-blue: #020a18;
            --text-white: #e6f1ff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000;
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--text-white);
            overflow: hidden;
        }

        /* --- 1. イントロ画面（表彰式・フォトギャラリー演出） --- */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 1.5s ease;
        }

        .ceremony-intro-box {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 2s ease;
            z-index: 10;
        }

        .company-name-intro {
            font-size: 1.4rem;
            color: var(--gold);
            letter-spacing: 0.5em;
            margin-bottom: 10px;
            font-weight: 300;
            background: linear-gradient(90deg, #d4af37, #fff, #d4af37);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        .event-title-intro {
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            color: #fff;
            text-shadow: 0 0 30px rgba(212,175,55,0.4);
        }

        /* フォトギャラリーの配置 */
        .photo-gallery {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
            perspective: 1000px;
            animation: fadeInUp 2.5s ease;
        }

        .photo-item {
            width: 260px;
            height: 180px;
            border: 3px solid #fff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            border-radius: 4px;
            overflow: hidden;
            transition: transform 0.5s;
            background-color: #333;
        }
        
        /* 写真を少し傾けて動きを出す */
        .photo-item:nth-child(1) { transform: rotate(-5deg) translateY(10px); }
        .photo-item:nth-child(2) { transform: scale(1.1) z-index: 5; }
        .photo-item:nth-child(3) { transform: rotate(5deg) translateY(10px); }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
        }

        .start-button {
            padding: 15px 100px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-size: 1.4rem;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 0.6em;
            transition: 0.5s;
            z-index: 20;
        }

        .start-button:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 60px rgba(212,175,55,0.6);
        }

        /* パスワード入力エリア */
        #password-area { display: none; text-align: center; animation: fadeInUp 1s forwards; }
        #pw-input {
            padding: 15px; font-size: 1.5rem; border-radius: 2px; border: 1px solid var(--gold);
            background: rgba(255,255,255,0.05); color: white; text-align: center; outline: none; width: 180px;
            letter-spacing: 0.5em;
        }
        .error-msg { color: #ff4d4d; font-size: 1rem; margin-top: 15px; display: none; }

        /* --- 2. メイン画面 --- */
        #main-content {
            display: none; opacity: 0; flex-direction: column; align-items: center;
            height: 100vh; width: 100%; overflow-y: auto; background-color: var(--dark-blue);
        }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        header { text-align: center; padding: 80px 20px 20px; }
        .company-logo { font-size: 1.1rem; color: var(--gold); letter-spacing: 0.2em; margin-bottom: 5px; }
        h1 {
            font-size: 3rem; margin: 0; font-weight: 900;
            background: linear-gradient(45deg, #fff 20%, var(--gold) 50%, #fff 80%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .member-grid {
            display: none; max-width: 1100px; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 30px; padding: 40px 20px; width: 90%;
        }

        .member-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 12px; padding: 50px 20px; text-align: center;
            backdrop-filter: blur(15px); opacity: 0; transform: translateY(40px);
        }

        .reveal-animation { animation: cardAppear 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards; }
        @keyframes cardAppear { to { opacity: 1; transform: translateY(0); } }

        .member-name { font-size: 2.2rem; font-weight: 900; color: #fff; margin-bottom: 10px; }
        .member-tag { font-size: 0.8rem; color: var(--gold); border: 1px solid var(--gold); padding: 3px 12px; border-radius: 50px; }

        #event-info {
            display: none; opacity: 0; margin-top: 50px; padding: 30px;
            border: 2px solid var(--gold); background: rgba(212, 175, 55, 0.05);
            border-radius: 10px; text-align: center; width: 80%; max-width: 600px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            animation: fadeInUp 1.5s ease forwards;
        }

        .event-date-time { font-size: 2.5rem; font-weight: 900; color: #fff; letter-spacing: 0.1em; }

        footer { padding: 50px; color: rgba(255,255,255,0.2); font-size: 0.9rem; }

        @keyframes shine { to { background-position: 200% center; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <audio id="bgm1" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg"></audio>
    <audio id="bgm2" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg"></audio>

    <!-- 1. イントロ画面 -->
    <div id="intro-screen">
        <div class="ceremony-intro-box">
            <div class="company-name-intro">株式会社キューマックス</div>
            <div class="event-title-intro">２０２５年度コーチング大会選出</div>
        </div>

        <!-- 3点画像の飾り -->
        <div class="photo-gallery">
            <div class="photo-item"><img src="photo1.jpg" alt="大会風景1"></div>
            <div class="photo-item"><img src="photo2.jpg" alt="大会風景2"></div>
            <div class="photo-item"><img src="photo3.jpg" alt="大会風景3"></div>
        </div>
        
        <button class="start-button" id="start-btn" onclick="showPasswordInput()">START</button>

        <div id="password-area">
            <input type="password" id="pw-input" maxlength="4" placeholder="••••">
            <div class="error-msg" id="error-msg">パスワードが正しくありません</div>
        </div>
    </div>

    <!-- 背景パーティクル -->
    <canvas id="particleCanvas"></canvas>

    <!-- 2. メイン画面 -->
    <div id="main-content">
        <header>
            <div class="company-logo">株式会社キューマックス</div>
            <h1>選出メンバー発表</h1>
            <p style="color: #8892b0; margin-top: 10px;">2025年度 コーチング大会</p>
        </header>

        <div id="reveal-btn-container" style="text-align:center; margin-top: 80px;">
            <button class="reveal-button" onclick="revealMembers()" style="padding: 22px 70px; background: var(--gold); color: #000; font-size: 1.6rem; cursor: pointer; border: none; font-weight: 900; border-radius: 50px; box-shadow: 0 0 30px rgba(212,175,55,0.5); transition: 0.4s; letter-spacing: 0.1em;">選出メンバーを公開する</button>
        </div>

        <div class="member-grid" id="member-grid">
            <div class="member-card"><div class="member-name">三浦</div><span class="member-tag">大会選出</span></div>
            <div class="member-card"><div class="member-name">ユベール</div><span class="member-tag">大会選出</span></div>
            <div class="member-card"><div class="member-name">黄</div><span class="member-tag">大会選出</span></div>
            <div class="member-card"><div class="member-name">中村</div><span class="member-tag">大会選出</span></div>
            <div class="member-card"><div class="member-name">牟田</div><span class="member-tag">大会選出</span></div>
            <div class="member-card"><div class="member-name">松井</div><span class="member-tag">大会選出</span></div>
            <div class="member-card"><div class="member-name">石田</div><span class="member-tag">大会選出</span></div>
        </div>

        <div id="event-info">
            <div style="font-size: 1.2rem; color: var(--gold); letter-spacing: 0.3em; margin-bottom: 10px;">大会開催日時</div>
            <div class="event-date-time">4月17日 13:00</div>
        </div>

        <footer>&copy; 2026 株式会社キューマックス</footer>
    </div>

    <script>
        const CORRECT_PW = "0410";
        const bgm1 = document.getElementById('bgm1');
        const bgm2 = document.getElementById('bgm2');

        function showPasswordInput() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('password-area').style.display = 'block';
            document.getElementById('pw-input').focus();
        }

        document.getElementById('pw-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkPassword();
        });

        function checkPassword() {
            const input = document.getElementById('pw-input').value;
            if (input === CORRECT_PW) {
                goToMain();
            } else {
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('pw-input').value = "";
            }
        }

        function goToMain() {
            bgm1.volume = 0.4;
            bgm1.play();
            document.getElementById('intro-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                setTimeout(() => {
                    document.getElementById('main-content').style.opacity = '1';
                    document.getElementById('main-content').style.transition = 'opacity 2s ease';
                    initParticles();
                }, 100);
            }, 1500);
        }

        function revealMembers() {
            bgm1.pause();
            bgm2.volume = 0.5;
            bgm2.play();

            document.getElementById('reveal-btn-container').style.display = 'none';
            const grid = document.getElementById('member-grid');
            grid.style.display = 'grid';
            
            const cards = document.querySelectorAll('.member-card');
            const totalMembers = cards.length;

            cards.forEach((card, index) => {
                setTimeout(() => {
                    card.classList.add('reveal-animation');
                    if (index === totalMembers - 1) {
                        setTimeout(showEventDate, 1500);
                    }
                }, index * 900 + 500);
            });
        }

        function showEventDate() {
            const eventInfo = document.getElementById('event-info');
            eventInfo.style.display = 'block';
            setTimeout(() => { eventInfo.style.opacity = '1'; }, 50);
        }

        // パーティクルロジック
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() { this.init(); }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 10;
                this.size = Math.random() * 3 + 1;
                this.speedY = Math.random() * -1.2 - 0.3;
                this.speedX = Math.random() * 0.6 - 0.3;
                this.opacity = Math.random() * 0.5 + 0.2;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y < -10) this.init();
            }
            draw() {
                ctx.fillStyle = `rgba(212, 175, 55, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            for(let i = 0; i < 100; i++) particles.push(new Particle());
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
